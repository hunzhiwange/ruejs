[package]
name = "swc_plugin_rue"
version = "0.0.1"
edition = "2021"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
swc_core = { version = "50.1.3", features = [
  "ecma_plugin_transform",
  "ecma_visit",
  "ecma_ast",
  "ecma_parser",
  "ecma_codegen",
] }
serde = "1.0.225"
serde_json = "1.0.132"
js-sys = "0.3"

[dev-dependencies]
swc_ecma_parser = { version = "29.0.1", features = ["typescript"] }
