[package]
name = "app-rust"
version = "0.0.1"
edition = "2021"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
wasm-bindgen = "0.2"
js-sys = "0.3"
runtime-vapor = { path = "../runtime-vapor" }
wgpu = { version = "0.20", default-features = false, features = [
  "webgpu",
  "wgsl",
  "webgl",
], optional = true }
web-sys = { version = "0.3", features = ["Window", "Document", "HtmlCanvasElement"] }
wasm-bindgen-futures = "0.4"
bytemuck = "1.14"

[features]
default = []
dev = []
wgpu_rs = ["wgpu"]

[profile.release]
opt-level = "z"
lto = true
codegen-units = 1
panic = "abort"
strip = true

[package.metadata.wasm-pack.profile.release]
wasm-opt = false
